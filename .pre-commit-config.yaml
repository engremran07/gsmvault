repos:
  # -------------------------------------------------------------------------
  # Ruff: lint + format (replaces black, isort, flake8 — DO NOT add those back)
  # Project uses ruff exclusively. Python 3.12+, line-length 88.
  # -------------------------------------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.6
    hooks:
      - id: ruff
        name: ruff lint (--fix)
        args: ["--fix", "--exit-non-zero-on-fix"]
        exclude: "migrations/"
      - id: ruff-format
        name: ruff format
        exclude: "migrations/"

  # -------------------------------------------------------------------------
  # General file hygiene
  # -------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "migrations/"
      - id: end-of-file-fixer
        exclude: "migrations/"
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-json
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]
      - id: debug-statements
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: check-case-conflict
      - id: check-toml

  # -------------------------------------------------------------------------
  # Security: bandit static analysis (OWASP Top 10 patterns)
  # -------------------------------------------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        name: bandit security scan
        args: ["-c", "pyproject.toml", "--recursive", "-ll"]
        exclude: "(tests/|conftest\\.py|scripts/|migrations/)"
        additional_dependencies: ["bandit[toml]"]

# Configuration
default_language_version:
  python: python3.10

fail_fast: false
exclude: "migrations/|node_modules/|\.venv/|build/|dist/"
