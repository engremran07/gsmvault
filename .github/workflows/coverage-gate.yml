name: Coverage Gate

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  COVERAGE_THRESHOLD: 60

jobs:
  coverage:
    name: Enforce Test Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: appdb
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgres://postgres:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/appdb
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SETTINGS_MODULE: app.settings_dev
      SECRET_KEY: ${{ secrets.SECRET_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install coverage[toml]

      - name: Run migrations
        run: python manage.py migrate --settings=app.settings_dev

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=apps \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            -q
        id: tests

      - name: Parse coverage percentage
        if: always()
        id: coverage
        run: |
          if [ -f coverage.xml ]; then
            COVERAGE=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('coverage.xml')
          root = tree.getroot()
          rate = float(root.attrib.get('line-rate', 0))
          print(f'{rate * 100:.1f}')
          ")
            echo "percentage=$COVERAGE" >> "$GITHUB_OUTPUT"
            echo "Coverage: ${COVERAGE}%"
          else
            echo "percentage=0" >> "$GITHUB_OUTPUT"
            echo "::warning::No coverage.xml found"
          fi

      - name: Check coverage threshold
        if: always()
        run: |
          COVERAGE="${{ steps.coverage.outputs.percentage }}"
          THRESHOLD="${{ env.COVERAGE_THRESHOLD }}"
          echo "Coverage: ${COVERAGE}% (threshold: ${THRESHOLD}%)"
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi
          echo "✓ Coverage ${COVERAGE}% meets threshold ${THRESHOLD}%"

      - name: Post coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.percentage }}';
            const threshold = '${{ env.COVERAGE_THRESHOLD }}';
            const passed = parseFloat(coverage) >= parseFloat(threshold);
            const icon = passed ? '✅' : '❌';
            const status = passed ? 'PASSED' : 'FAILED';

            const body = `## ${icon} Coverage Report — ${status}

            | Metric | Value |
            |--------|-------|
            | **Coverage** | ${coverage}% |
            | **Threshold** | ${threshold}% |
            | **Status** | ${status} |

            ${passed
              ? '> Coverage meets the minimum threshold.'
              : '> ⚠️ Coverage is below the minimum threshold. Please add tests before merging.'}
            `;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Coverage Report')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
