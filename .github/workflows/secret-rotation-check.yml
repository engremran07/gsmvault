name: Secret Rotation Check

on:
  schedule:
    - cron: "0 0 1 * *" # 1st of every month at midnight UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-rotation:
    name: Verify Secret Rotation Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check .env.sample has all required keys
        run: |
          REQUIRED_KEYS=(
            "DJANGO_SECRET_KEY"
            "DATABASE_URL"
            "DB_NAME"
            "DB_USER"
            "DB_PASSWORD"
            "DB_HOST"
            "DB_PORT"
            "REDIS_URL"
            "CELERY_BROKER_URL"
            "DJANGO_ALLOWED_HOSTS"
          )

          MISSING=0
          echo "### Checking .env.sample for required keys..." | tee /tmp/rotation-report.txt

          if [ ! -f ".env.sample" ] && [ ! -f ".env.example" ]; then
            echo "::warning::.env.sample or .env.example not found"
            echo "WARNING: No .env sample file found" >> /tmp/rotation-report.txt
          else
            ENV_FILE=$([ -f ".env.sample" ] && echo ".env.sample" || echo ".env.example")
            for KEY in "${REQUIRED_KEYS[@]}"; do
              if ! grep -q "^${KEY}=" "$ENV_FILE" 2>/dev/null; then
                echo "::warning::Missing key in ${ENV_FILE}: ${KEY}"
                echo "MISSING: ${KEY}" >> /tmp/rotation-report.txt
                MISSING=$((MISSING + 1))
              else
                echo "OK: ${KEY}" >> /tmp/rotation-report.txt
              fi
            done
          fi

          echo "" >> /tmp/rotation-report.txt
          echo "Missing keys: ${MISSING}" >> /tmp/rotation-report.txt

      - name: Verify no secrets in source code
        run: |
          echo "" >> /tmp/rotation-report.txt
          echo "### Scanning source for hardcoded secrets..." >> /tmp/rotation-report.txt
          ISSUES=0

          # Check for actual secret values (not references to env vars or placeholders)
          SECRET_PATTERNS=(
            'SECRET_KEY\s*=\s*["\x27][A-Za-z0-9+/=]{20,}["\x27]'
            'PASSWORD\s*=\s*["\x27][^${\s][^\x27"]{3,}["\x27]'
            'API_KEY\s*=\s*["\x27][A-Za-z0-9]{16,}["\x27]'
            'PRIVATE_KEY\s*=\s*["\x27]-----BEGIN'
          )

          for PATTERN in "${SECRET_PATTERNS[@]}"; do
            MATCHES=$(grep -rnl --include="*.py" -E "$PATTERN" apps/ app/ scripts/ 2>/dev/null | \
              grep -v "__pycache__" | \
              grep -v "migrations/" | \
              grep -v "test" | \
              grep -v "ci-" | \
              grep -v "example" | \
              grep -v "placeholder" || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential secret in: $MATCHES"
              echo "FOUND in: $MATCHES" >> /tmp/rotation-report.txt
              ISSUES=$((ISSUES + 1))
            fi
          done

          if [ "$ISSUES" -eq 0 ]; then
            echo "No hardcoded secrets found in source." >> /tmp/rotation-report.txt
          fi

      - name: Scan git history for leaked secrets
        run: |
          echo "" >> /tmp/rotation-report.txt
          echo "### Scanning recent git history (last 100 commits)..." >> /tmp/rotation-report.txt
          LEAKS=0

          # Check recent commits for accidentally committed secrets
          SENSITIVE_FILES=(
            ".env"
            "*.pem"
            "*.key"
            "*.p12"
            "*.pfx"
            "id_rsa"
            "id_ed25519"
            "service_account*.json"
          )

          for PATTERN in "${SENSITIVE_FILES[@]}"; do
            FOUND=$(git log --all --diff-filter=A --name-only --pretty=format: -100 -- "$PATTERN" 2>/dev/null | sort -u | head -20)
            if [ -n "$FOUND" ]; then
              echo "::warning::Sensitive file detected in git history: $FOUND"
              echo "LEAKED FILE: $FOUND" >> /tmp/rotation-report.txt
              LEAKS=$((LEAKS + 1))
            fi
          done

          if [ "$LEAKS" -eq 0 ]; then
            echo "No leaked sensitive files in recent history." >> /tmp/rotation-report.txt
          else
            echo "Found $LEAKS sensitive file(s) in git history." >> /tmp/rotation-report.txt
          fi

      - name: Check .gitignore covers sensitive paths
        run: |
          echo "" >> /tmp/rotation-report.txt
          echo "### Verifying .gitignore coverage..." >> /tmp/rotation-report.txt

          REQUIRED_IGNORES=(
            ".env"
            "*.pem"
            "*.key"
            "storage_credentials/"
          )

          for ENTRY in "${REQUIRED_IGNORES[@]}"; do
            if grep -q "$ENTRY" .gitignore 2>/dev/null; then
              echo "OK: $ENTRY in .gitignore" >> /tmp/rotation-report.txt
            else
              echo "::warning::$ENTRY not found in .gitignore"
              echo "MISSING from .gitignore: $ENTRY" >> /tmp/rotation-report.txt
            fi
          done

      - name: Upload rotation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: secret-rotation-${{ github.run_id }}
          path: /tmp/rotation-report.txt
          retention-days: 90

      - name: Generate summary
        run: |
          echo "## Secret Rotation Compliance Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Date**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat /tmp/rotation-report.txt >> "$GITHUB_STEP_SUMMARY"
