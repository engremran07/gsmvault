name: Dependency Audit

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 3:00 UTC
  push:
    paths:
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  PYTHON_VERSION: "3.12"

jobs:
  audit:
    name: Audit Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install audit tools
        run: pip install pip-audit

      - name: Run pip-audit
        id: pip_audit
        run: |
          set +e
          pip-audit --format=json --output=/tmp/audit.json 2>&1
          AUDIT_EXIT=$?
          pip-audit --desc 2>&1 | tee /tmp/audit.txt
          set -e

          VULN_COUNT=$(python3 -c "
          import json, sys
          try:
              data = json.load(open('/tmp/audit.json'))
              deps = data.get('dependencies', [])
              vulns = sum(len(d.get('vulns', [])) for d in deps)
              print(vulns)
          except Exception:
              print(0)
          ")

          echo "vuln_count=${VULN_COUNT}" >> "$GITHUB_OUTPUT"
          echo "audit_exit=${AUDIT_EXIT}" >> "$GITHUB_OUTPUT"
          echo "Found ${VULN_COUNT} vulnerabilities"

      - name: Check dependency chains
        id: pip_check
        run: |
          set +e
          pip check 2>&1 | tee /tmp/pip-check.txt
          CHECK_EXIT=$?
          set -e
          echo "check_exit=${CHECK_EXIT}" >> "$GITHUB_OUTPUT"

      - name: Check for outdated packages
        run: |
          pip list --outdated --format=columns 2>&1 | tee /tmp/outdated.txt
          OUTDATED_COUNT=$(tail -n +3 /tmp/outdated.txt | wc -l)
          echo "Found ${OUTDATED_COUNT} outdated packages"

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.run_id }}
          path: |
            /tmp/audit.json
            /tmp/audit.txt
            /tmp/pip-check.txt
            /tmp/outdated.txt
          retention-days: 30

      - name: Create issue on vulnerabilities
        if: steps.pip_audit.outputs.vuln_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const auditText = fs.readFileSync('/tmp/audit.txt', 'utf8');
            const vulnCount = '${{ steps.pip_audit.outputs.vuln_count }}';
            const today = new Date().toISOString().split('T')[0];
            const title = `[Dependencies] ${vulnCount} vulnerabilities found — ${today}`;

            // Check for existing open issue with same prefix
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'dependencies,security'
            });

            const existing = issues.data.find(i => i.title.startsWith('[Dependencies]'));
            const body = `## Dependency Vulnerability Report\n\n` +
              `**Vulnerabilities found**: ${vulnCount}\n` +
              `**Scan date**: ${today}\n\n` +
              `### Details\n\`\`\`\n${auditText.substring(0, 3000)}\n\`\`\`\n\n` +
              `[View full report](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
              console.log(`Updated existing issue #${existing.number}`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['dependencies', 'security', 'automated']
              });
              console.log('Created new vulnerability issue');
            }

      - name: Fail on critical vulnerabilities
        if: steps.pip_audit.outputs.audit_exit != '0'
        run: |
          echo "::error::pip-audit found vulnerabilities. Review /tmp/audit.txt for details."
          exit 1
