name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  FIREBASE_PROJECT_ID: actechs-d415e

jobs:
  deploy-web:
    name: Build And Deploy Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve app version from pubspec
        id: app_version
        run: |
          VERSION_LINE=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          if [ -z "$VERSION_LINE" ]; then
            echo "Unable to resolve version from pubspec.yaml"
            exit 1
          fi

          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}

          echo "full=$VERSION_LINE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          mkdir -p lib

          if [ -n "$FIREBASE_OPTIONS_DART" ]; then
            echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
            echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"
          elif [ -f lib/firebase_options.dart ]; then
            echo "Using checked-in lib/firebase_options.dart"
          fi

          if [ ! -f lib/firebase_options.dart ]; then
            echo "lib/firebase_options.dart was not found after resolution"
            exit 1
          fi

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is missing DefaultFirebaseOptions"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyse
        run: flutter analyze --no-pub

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('scripts/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: ${{ runner.os }}-firebase-emulators-

      - name: Install rules test dependencies
        working-directory: scripts
        run: npm ci

      - name: Strict Firestore rules lint
        working-directory: scripts
        run: npm run lint:firestore-rules

      - name: Strict Firestore rules tests
        working-directory: scripts
        run: npm test

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run web-safe test suite gate
        run: flutter test

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-web-${{ steps.app_version.outputs.full }}-run${{ github.run_number }}
          path: build/web
          retention-days: 14

      - name: Resolve Google Cloud auth mode
        id: auth_mode
        env:
          GOOGLE_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GOOGLE_WORKLOAD_IDENTITY_PROVIDER }}
          GOOGLE_SERVICE_ACCOUNT_EMAIL: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_EMAIL }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACTECHS_D415E }}
        run: |
          AUTH_MODE=""

          if [ -n "$FIREBASE_SERVICE_ACCOUNT_JSON" ]; then
            AUTH_MODE="credentials_json"
          fi

          if [ -n "$GOOGLE_WORKLOAD_IDENTITY_PROVIDER" ] || [ -n "$GOOGLE_SERVICE_ACCOUNT_EMAIL" ]; then
            if [ -z "$GOOGLE_WORKLOAD_IDENTITY_PROVIDER" ] || [ -z "$GOOGLE_SERVICE_ACCOUNT_EMAIL" ]; then
              echo "Both GOOGLE_WORKLOAD_IDENTITY_PROVIDER and GOOGLE_SERVICE_ACCOUNT_EMAIL secrets are required for Workload Identity Federation."
              exit 1
            fi

            if [ -n "$AUTH_MODE" ]; then
              echo "Configure exactly one Google auth mode: either FIREBASE_SERVICE_ACCOUNT_ACTECHS_D415E or GOOGLE_WORKLOAD_IDENTITY_PROVIDER plus GOOGLE_SERVICE_ACCOUNT_EMAIL."
              exit 1
            fi

            AUTH_MODE="workload_identity"
            echo "workload_identity_provider=$GOOGLE_WORKLOAD_IDENTITY_PROVIDER" >> "$GITHUB_OUTPUT"
            echo "service_account=$GOOGLE_SERVICE_ACCOUNT_EMAIL" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$AUTH_MODE" ]; then
            echo "Missing Google Cloud deploy credentials. Configure FIREBASE_SERVICE_ACCOUNT_ACTECHS_D415E or GOOGLE_WORKLOAD_IDENTITY_PROVIDER plus GOOGLE_SERVICE_ACCOUNT_EMAIL to enable Hosting deploys."
            echo "mode=skip" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "mode=$AUTH_MODE" >> "$GITHUB_OUTPUT"

      - name: Skip Firebase Hosting deploy
        if: steps.auth_mode.outputs.mode == 'skip'
        run: echo "Skipping Firebase Hosting deploy because Google Cloud credentials are not configured for this repository."

      - name: Authenticate to Google Cloud with Workload Identity
        if: steps.auth_mode.outputs.mode == 'workload_identity'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ steps.auth_mode.outputs.workload_identity_provider }}
          service_account: ${{ steps.auth_mode.outputs.service_account }}

      - name: Authenticate to Google Cloud with Service Account JSON
        if: steps.auth_mode.outputs.mode == 'credentials_json'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_ACTECHS_D415E }}

      - name: Set up Cloud SDK
        if: steps.auth_mode.outputs.mode != 'skip'
        uses: google-github-actions/setup-gcloud@v2

      - name: Install Firebase CLI
        if: steps.auth_mode.outputs.mode != 'skip'
        run: npm install -g firebase-tools

      - name: Deploy Firebase Hosting
        if: steps.auth_mode.outputs.mode != 'skip'
        run: firebase deploy --only hosting --project "$FIREBASE_PROJECT_ID"