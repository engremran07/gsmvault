# AC Techs — Continuous Integration
#
# Runs on every push to main and on all pull requests.
# Can also be triggered manually via workflow_dispatch.
# Steps: static analysis → unit tests → debug APK build.
#
# Optional repository secrets for debug CI builds:
#   GOOGLE_SERVICES_JSON  — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART — base64-encoded lib/firebase_options.dart
# If omitted, CI generates debug-only stubs so analysis, tests, and APK builds
# can still run on GitHub without production Firebase config.

name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_apk:
        description: 'Build and upload debug APK'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Lint & Analyse ─────────────────────────────────────────────────────────
  analyse:
    name: Flutter Analyse
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options stub (for static analysis)
        run: echo "" | base64 --decode > lib/firebase_options.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Dart format check
        run: dart format --output=none --set-exit-if-changed lib/ test/

      - name: Flutter analyse
        run: flutter analyze --no-pub

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [analyse, firestore-rules]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options stub (for tests)
        run: echo "" | base64 --decode > lib/firebase_options.dart

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test --coverage

      - name: Verify coverage file exists
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "ERROR: coverage/lcov.info not found — no tests ran or coverage was not collected."
            exit 1
          fi

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          retention-days: 7

      - name: Enforce coverage threshold (60%)
        run: |
          if ! command -v lcov &> /dev/null; then
            sudo apt-get install -y lcov --quiet
          fi
          SUMMARY=$(lcov --summary coverage/lcov.info 2>&1)
          COVERAGE=$(echo "$SUMMARY" | grep -oP '[0-9]+\.[0-9]+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "ERROR: Could not parse coverage from lcov summary."
            exit 1
          fi
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "FAIL: Line coverage ${COVERAGE}% is below the 60% threshold."
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets the 60% threshold."

  firestore-rules:
    name: Firestore Rules Tests
    runs-on: ubuntu-latest
    # Runs in parallel with analyse — both feed into test
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scripts
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21 for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('scripts/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: ${{ runner.os }}-firebase-emulators-

      - name: Install rules test dependencies
        run: npm ci

      - name: Strict Firestore rules lint
        run: npm run lint:firestore-rules

      - name: Run Firestore rules regression tests
        run: npm test

  # ── Debug APK Build ────────────────────────────────────────────────────────
  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: test
    # Skip if manually triggered with build_apk=false
    if: github.event.inputs.build_apk != 'false'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Resolve google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          APP_ID=$(grep -m1 'applicationId = "' android/app/build.gradle.kts | sed -E 's/.*applicationId = "([^"]+)".*/\1/')
          if [ -z "$APP_ID" ]; then
            echo "Unable to determine applicationId from android/app/build.gradle.kts"
            exit 1
          fi

          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            cat > android/app/google-services.json <<EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "ci-stub",
              "storage_bucket": "ci-stub.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:ci00000000000000",
                  "android_client_info": {
                    "package_name": "$APP_ID"
                  }
                },
                "api_key": [
                  {
                    "current_key": "ci-debug-stub"
                  }
                ]
              }
            ],
            "configuration_version": "1"
          }
          EOF
            echo "Using generated debug stub google-services.json"
            exit 0
          fi

          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          echo "Using google-services.json from secret"

          if ! grep -q "\"package_name\":\"$APP_ID\"" android/app/google-services.json; then
            echo "google-services.json is invalid or does not match applicationId $APP_ID"
            exit 1
          fi

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          mkdir -p lib

          if [ -z "$FIREBASE_OPTIONS_DART" ]; then
            if [ -f lib/firebase_options.dart ]; then
              echo "Using checked-in lib/firebase_options.dart"
              exit 0
            fi

            cat > lib/firebase_options.dart <<'EOF'
          // ignore_for_file: lines_longer_than_80_chars, avoid_classes_with_only_static_members
          // CI debug stub - not used at runtime.
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform =>
                throw UnsupportedError('CI debug stub only.');
          }
          EOF
            echo "Using generated debug stub firebase_options.dart"
            exit 0
          fi

          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is invalid or missing DefaultFirebaseOptions"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename APK with build number
        run: |
          cp build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ac-techs-debug-$(date +%Y%m%d-%H%M).apk

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-debug-${{ github.run_number }}
          path: build/app/outputs/flutter-apk/ac-techs-debug-*.apk
          retention-days: 14

  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create firebase_options stub (for web build)
        run: echo "" | base64 --decode > lib/firebase_options.dart

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-web-${{ github.run_number }}
          path: build/web
          retention-days: 14

  # ── Code Hygiene Gates ──────────────────────────────────────────────────────
  hygiene:
    name: Code Hygiene Gates
    runs-on: ubuntu-latest
    needs: [analyse]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Gate — Governance continuity files present
        run: |
          required_files=(
            MASTER_BLUEPRINT.md
            REGRESSION_REGISTRY.md
            SESSION_LOG.md
            CHANGELOG.md
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "❌ FAIL: missing governance continuity file: $file"
              exit 1
            fi
          done
          echo "✅ Governance continuity files present"

      - name: Gate — Collection name consistency
        run: |
          if grep -rn "ac_installations" .claude/ .github/instructions/ README.md 2>/dev/null | grep -v "\.git"; then
            echo "❌ FAIL: docs reference 'ac_installations' but code uses 'ac_installs'"
            echo "Fix: update all .md files to use 'ac_installs'"
            exit 1
          fi
          echo "✅ Collection names consistent"

      - name: Gate — ARB key parity
        run: |
          EN=$(python3 -c "import json; d=json.load(open('lib/l10n/app_en.arb')); print('\n'.join(sorted([k for k in d if not k.startswith('@')])))")
          UR=$(python3 -c "import json; d=json.load(open('lib/l10n/app_ur.arb')); print('\n'.join(sorted([k for k in d if not k.startswith('@')])))")
          AR=$(python3 -c "import json; d=json.load(open('lib/l10n/app_ar.arb')); print('\n'.join(sorted([k for k in d if not k.startswith('@')])))")
          FAIL=0
          if [ "$EN" != "$UR" ]; then
            echo "❌ FAIL: ARB key mismatch between en and ur:"
            diff <(echo "$EN") <(echo "$UR") || true
            FAIL=1
          fi
          if [ "$EN" != "$AR" ]; then
            echo "❌ FAIL: ARB key mismatch between en and ar:"
            diff <(echo "$EN") <(echo "$AR") || true
            FAIL=1
          fi
          [ $FAIL -eq 0 ] && echo "✅ ARB keys consistent across en/ur/ar"
          exit $FAIL

      - name: Gate — No hard deletes in tech repositories
        run: |
          if grep -rn "\.delete()" lib/features/expenses/data/ 2>/dev/null; then
            echo "❌ FAIL: Hard .delete() call found in tech-owned repository"
            echo "Use archiveExpense() / archiveEarning() / archiveInstall() instead"
            exit 1
          fi
          echo "✅ No hard deletes in expense repositories"

      - name: Gate — isDeleted Firestore query anti-pattern
        run: |
          if grep -rn "where.*isDeleted\|isDeleted.*where" lib/features/expenses/data/ 2>/dev/null; then
            echo "❌ FAIL: isDeleted Firestore query found — filter in Dart, not Firestore"
            echo "Dart-layer filtering avoids composite index costs (see firebase.md)"
            exit 1
          fi
          echo "✅ No isDeleted Firestore query filters"

      - name: Gate — PDF not on main thread
        run: |
          if grep -n "await PdfGenerator\." \
               lib/features/admin/presentation/analytics_screen.dart \
               lib/features/expenses/presentation/daily_in_out_screen.dart 2>/dev/null; then
            echo "❌ FAIL: Direct await PdfGenerator call on main thread — wrap in compute()"
            exit 1
          fi
          echo "✅ No direct PdfGenerator calls on main thread"

      - name: Gate — Bottom nav documentation correct
        run: |
          if grep -q "4 tabs per role\|tech.*4 tabs\|4 tabs.*tech" .claude/rules/ui-conventions.md 2>/dev/null; then
            echo "❌ FAIL: ui-conventions.md says tech has 4 tabs — tech has 5 tabs"
            exit 1
          fi
          echo "✅ Bottom nav documentation correct"
