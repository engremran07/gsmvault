name: Weekly Audit

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  audit:
    name: Weekly Quality Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: '21'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Flutter analyse
        run: flutter analyze --no-pub

      - name: Run Flutter tests
        run: flutter test --coverage

      - name: Install Firestore rules dependencies
        working-directory: scripts
        run: npm ci

      - name: Lint Firestore rules
        working-directory: scripts
        run: npm run lint:firestore-rules

      - name: Run Firestore rules tests
        working-directory: scripts
        run: npm test

      - name: Gate — Collection name consistency
        run: |
          if grep -rn "ac_installations" .claude/ .github/instructions/ README.md 2>/dev/null; then
            echo "❌ FAIL: docs reference 'ac_installations' but code uses 'ac_installs'"
            exit 1
          fi
          echo "✅ Collection names consistent"

      - name: Gate — Detail routes use push not go
        run: |
          if grep -REn "context\.go\('/(admin/(settings|companies|settlements|flush|import)|tech/(summary|settlements|profile))'" lib/ 2>/dev/null; then
            echo "❌ FAIL: Detail or settings route uses context.go() — use context.push()"
            exit 1
          fi
          echo "✅ Detail routes preserve back stack"

      - name: Gate — No Colors.white in presentation screens
        run: |
          if grep -REn "Colors\.white" lib/features/*/presentation/ 2>/dev/null; then
            echo "❌ FAIL: Presentation screen hardcodes Colors.white — use theme colors instead"
            exit 1
          fi
          echo "✅ Presentation screens use theme colors"

      - name: Gate — Governance continuity files present
        run: |
          MISSING=""
          for file in MASTER_BLUEPRINT.md REGRESSION_REGISTRY.md SESSION_LOG.md CHANGELOG.md; do
            if [ ! -f "$file" ]; then
              MISSING="$MISSING $file"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "❌ FAIL: Missing governance continuity files:$MISSING"
            exit 1
          fi
          echo "✅ Governance continuity files are present"

      - name: Gate — CI validates web build
        run: |
          if ! grep -q "flutter build web --release" .github/workflows/ci.yml 2>/dev/null; then
            echo "❌ FAIL: CI does not validate the web release surface"
            exit 1
          fi
          echo "✅ CI validates the web build surface"

      - name: Gate — Release workflow builds web artifact
        run: |
          if ! grep -q "flutter build web --release" .github/workflows/release.yml 2>/dev/null; then
            echo "❌ FAIL: release.yml does not build the web artifact"
            exit 1
          fi
          echo "✅ release.yml builds the web artifact"

      - name: Gate — No hardcoded Firestore collection strings
        run: |
          if grep -REn "\.collection\('[a-z_]+'\)" lib/ 2>/dev/null; then
            echo "❌ FAIL: Firestore .collection() call with hardcoded string literal — use AppConstants.*"
            exit 1
          fi
          echo "✅ All Firestore collection calls use AppConstants"

      - name: Gate — No Navigator.push() in presentation code
        run: |
          if grep -REn "Navigator\.push\(" lib/features/ 2>/dev/null; then
            echo "❌ FAIL: Navigator.push() in presentation code — use context.push()"
            exit 1
          fi
          echo "✅ No Navigator.push() in presentation layer"

      - name: Gate — No continue-on-error on keystore steps
        run: |
          if grep -B5 "continue-on-error: true" .github/workflows/release.yml 2>/dev/null | grep -q "keystore\|key.properties"; then
            echo "❌ FAIL: continue-on-error: true found on keystore step in release.yml"
            exit 1
          fi
          echo "✅ Keystore steps will hard-fail on errors"

      - name: Gate — No StreamProvider for single-day In/Out queries
        run: |
          VIOLATIONS=$(grep -REn "StreamProvider.*autoDispose.*for.*day\|todaysExpensesProvider.*StreamProvider\|todaysEarningsProvider.*StreamProvider\|todaysJobsProvider.*StreamProvider" lib/ 2>/dev/null)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: Found StreamProvider for single-day In/Out data:"
            echo "$VIOLATIONS"
            echo "Use Provider<AsyncValue<...>> derived from monthly provider instead."
            exit 1
          fi
          echo "✅ In/Out single-day providers are derived (no extra Firestore listeners)"

      - name: Gate — Auth errors propagate (no silent null swallow)
        run: |
          if grep -n "Stream\.value(null)" lib/features/auth/providers/auth_providers.dart 2>/dev/null; then
            echo "❌ FAIL: currentUserProvider swallows auth errors as Stream.value(null)"
            echo "Use Stream.error(e, st) so ErrorCard is shown on auth failures"
            exit 1
          fi
          echo "✅ Auth errors propagate to UI"

      - name: Gate — compileSdk and targetSdk in sync
        run: |
          COMPILE=$(grep "compileSdk" android/app/build.gradle.kts | grep -oP '\d+' | head -1)
          TARGET=$(grep "targetSdk" android/app/build.gradle.kts | grep -oP '\d+' | head -1)
          if [ "$COMPILE" != "$TARGET" ]; then
            echo "❌ FAIL: compileSdk ($COMPILE) != targetSdk ($TARGET) — they must match"
            exit 1
          fi
          echo "✅ compileSdk ($COMPILE) == targetSdk ($TARGET)"

      - name: Gate — No orphan providers (zero-consumer check)
        run: |
          # Check for provider names that only appear in their definition file (single hit total)
          PROVIDERS=$(grep -rEh "^final [a-zA-Z]+Provider\s*=" lib/features/*/providers/ 2>/dev/null | \
            grep -oP "(?<=final )[a-zA-Z]+Provider" | sort -u)
          ORPHANS=""
          for p in $PROVIDERS; do
            COUNT=$(grep -rE "\b${p}\b" lib/ 2>/dev/null | grep -v "^.*final ${p}" | wc -l)
            if [ "$COUNT" -eq 0 ]; then
              ORPHANS="$ORPHANS $p"
            fi
          done
          if [ -n "$ORPHANS" ]; then
            echo "❌ FAIL: Zero-consumer providers found (define but never watched/read):"
            echo "$ORPHANS"
            exit 1
          fi
          echo "✅ All providers have at least one consumer"

      - name: Gate — No duplicate allow rules in Firestore rules
        run: |
          # Check for duplicate allow verb in same match block
          python3 - <<'EOF'
          import re, sys
          rules = open('firestore.rules').read()
          blocks = re.findall(r'match\s+/[^\{]+\{([^\}]+match[^\}]*|\n[^\}]*?\})', rules, re.S)
          seen = {}
          lines = rules.split('\n')
          errors = []
          depth = 0
          block_start = 0
          block_verbs = {}
          for i, line in enumerate(lines, 1):
            prev_depth = depth
            depth += line.count('{') - line.count('}')
            if prev_depth > depth:
              block_verbs = {}   # reset on block close — prevents false positives across sibling match blocks
            m = re.search(r'allow\s+(get|list|create|update|delete|read|write)', line)
            if m:
              verb = (depth, m.group(1))
              if verb in block_verbs:
                errors.append(f"L{i}: duplicate 'allow {m.group(1)}' at depth {depth} (also at L{block_verbs[verb]})")
              else:
                block_verbs[verb] = i
          if errors:
            print('❌ FAIL: Duplicate allow rules in firestore.rules:')
            for e in errors:
              print(' ', e)
            sys.exit(1)
          print('✅ No duplicate allow rules in firestore.rules')
          EOF

      - name: Gate — Coverage threshold (60%)
        run: |
          if ! command -v lcov &> /dev/null; then
            sudo apt-get install -y lcov --quiet
          fi
          COVERAGE=$(lcov --summary coverage/lcov.info 2>&1 | grep -oP '[0-9]+\.[0-9]+(?=%)' | head -1)
          echo "Line coverage: ${COVERAGE}%"
          if [ -z "$COVERAGE" ]; then
            echo "WARN: Could not parse lcov summary — skipping threshold check"
            exit 0
          fi
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "❌ FAIL: Coverage ${COVERAGE}% is below 60% minimum"
            exit 1
          fi
          echo "✅ Coverage ${COVERAGE}% meets minimum threshold"

      - name: Gate — Shared install aggregates filter isFullyConsumed
        run: |
          # The pendingSharedInstallAggregatesProvider must filter out fully-consumed
          # aggregates so the "Add Your Share" list self-clears after all team members submit.
          if ! grep -n "isFullyConsumed" lib/features/jobs/providers/shared_install_providers.dart 2>/dev/null | grep -q "isFullyConsumed"; then
            echo "❌ FAIL: pendingSharedInstallAggregatesProvider missing isFullyConsumed filter"
            echo "Once all team members submit, the aggregate must disappear from 'Add Your Share'"
            exit 1
          fi
          echo "✅ Shared install provider filters fully-consumed aggregates"

      - name: Gate — Company required in job submission
        run: |
          # Company must be required (no includeNoCompanyOption: true) in submit_job_screen
          # so that techs cannot submit a job without a company when companies exist.
          # A missing company cannot be corrected after approval.
          VIOLATIONS=$(grep -n "includeNoCompanyOption: true" lib/features/technician/presentation/submit_job_screen.dart 2>/dev/null)
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FAIL: submit_job_screen.dart uses includeNoCompanyOption: true"
            echo "Company selection is required when companies exist. If no companies, field is hidden."
            echo "$VIOLATIONS"
            exit 1
          fi
          echo "✅ Company selection is required in job submission form"

      - name: Gate — Firestore rules helper functions use short-circuit not ternary
        run: |
          # isAdmin() and isActiveUser() must use && short-circuit evaluation.
          # The let data = ternary pattern causes [W] static analyser warnings.
          if grep -n "let data = userExists() ? userData()" firestore.rules 2>/dev/null; then
            echo "❌ FAIL: firestore.rules uses conditional-get ternary in isAdmin/isActiveUser"
            echo "Use userExists() && isUserActive(userData()) && ... (short-circuit) instead"
            exit 1
          fi
          echo "✅ Firestore rules helpers use short-circuit evaluation (no analyser warnings)"