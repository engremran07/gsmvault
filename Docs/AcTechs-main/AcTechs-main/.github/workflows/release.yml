# AC Techs — Release Build & Publish
#
# Triggered when a version tag of the form `v*.*.*` is pushed (e.g. v1.2.0),
# or manually via workflow_dispatch (for pre-release testing).
# Builds both debug and release APKs, then creates a GitHub Release and
# attaches both APKs as downloadable assets.
#
# Required repository secrets:
#   GOOGLE_SERVICES_JSON    — base64-encoded android/app/google-services.json
#   FIREBASE_OPTIONS_DART   — base64-encoded lib/firebase_options.dart
#   KEYSTORE_FILE           — base64-encoded release keystore (.jks / .keystore)
#   KEYSTORE_PASSWORD       — store password
#   KEY_ALIAS               — key alias
#   KEY_PASSWORD            — key password
#
# To create a release:
#   git tag v1.0.0
#   git push origin v1.0.0

name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub Release'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  # ── Release Build ──────────────────────────────────────────────────────────
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for changelog generation

      - name: Resolve app version from pubspec
        id: app_version
        run: |
          VERSION_LINE=$(grep -m1 '^version:' pubspec.yaml | sed 's/^version:[[:space:]]*//')
          if [ -z "$VERSION_LINE" ]; then
            echo "Unable to resolve version from pubspec.yaml"
            exit 1
          fi

          VERSION_NAME=${VERSION_LINE%%+*}
          VERSION_CODE=${VERSION_LINE##*+}

          echo "full=$VERSION_LINE" >> "$GITHUB_OUTPUT"
          echo "name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "code=$VERSION_CODE" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: release_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=v${{ steps.app_version.outputs.name }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches pubspec version
        if: github.event_name == 'push'
        run: |
          EXPECTED_TAG="v${{ steps.app_version.outputs.name }}"
          if [ "$GITHUB_REF_NAME" != "$EXPECTED_TAG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $EXPECTED_TAG"
            exit 1
          fi

      - name: Validate versionCode monotonic increase
        shell: bash
        run: |
          CURRENT_CODE="${{ steps.app_version.outputs.code }}"
          CURRENT_TAG="${{ steps.release_version.outputs.value }}"

          if ! [[ "$CURRENT_CODE" =~ ^[0-9]+$ ]]; then
            echo "Current versionCode is not numeric: $CURRENT_CODE"
            exit 1
          fi

          PREV_TAG=$(
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
              | grep -v "^${CURRENT_TAG}$" \
              | head -n 1
          )

          if [ -z "$PREV_TAG" ]; then
            echo "No previous release tag found; skipping monotonic versionCode check."
            exit 0
          fi

          PREV_VERSION_LINE=$(git show "${PREV_TAG}:pubspec.yaml" | grep -m1 '^version:' | sed 's/^version:[[:space:]]*//')
          PREV_CODE="${PREV_VERSION_LINE##*+}"

          if ! [[ "$PREV_CODE" =~ ^[0-9]+$ ]]; then
            echo "Previous versionCode is not numeric: $PREV_CODE (tag ${PREV_TAG})"
            exit 1
          fi

          if [ "$CURRENT_CODE" -le "$PREV_CODE" ]; then
            echo "versionCode must increase. current=$CURRENT_CODE previous=$PREV_CODE (from ${PREV_TAG})"
            exit 1
          fi

          echo "versionCode monotonic check passed: ${PREV_CODE} -> ${CURRENT_CODE}"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter stable
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      # ── Gradle cache ────────────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/*.kts') }}
          restore-keys: ${{ runner.os }}-gradle-

      # ── Decode Firebase config secrets ──────────────────────────────────────
      - name: Resolve google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          APP_ID=$(grep -m1 'applicationId = "' android/app/build.gradle.kts | sed -E 's/.*applicationId = "([^"]+)".*/\1/')
          if [ -z "$APP_ID" ]; then
            echo "Unable to determine applicationId from android/app/build.gradle.kts"
            exit 1
          fi

          if [ -z "$GOOGLE_SERVICES_JSON" ]; then
            echo "GOOGLE_SERVICES_JSON secret is required for this workflow"
            exit 1
          fi

          echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json
          echo "Using google-services.json from secret"

          if ! grep -q "\"package_name\":\"$APP_ID\"" android/app/google-services.json; then
            echo "google-services.json is invalid or does not match applicationId $APP_ID"
            exit 1
          fi

      - name: Resolve firebase_options.dart
        env:
          FIREBASE_OPTIONS_DART: ${{ secrets.FIREBASE_OPTIONS_DART }}
        run: |
          mkdir -p lib

          if [ -z "$FIREBASE_OPTIONS_DART" ]; then
            if [ -f lib/firebase_options.dart ]; then
              echo "Using checked-in lib/firebase_options.dart"
              exit 0
            fi

            echo "FIREBASE_OPTIONS_DART secret is required for this workflow"
            exit 1
          fi

          echo "$FIREBASE_OPTIONS_DART" | base64 --decode > lib/firebase_options.dart
          echo "Using firebase_options.dart from FIREBASE_OPTIONS_DART secret"

          if ! grep -q "class DefaultFirebaseOptions" lib/firebase_options.dart; then
            echo "firebase_options.dart is invalid or missing DefaultFirebaseOptions"
            exit 1
          fi

      # ── Decode release keystore (optional but recommended) ─────────────────
      - name: Decode release keystore
        env:
          KEYSTORE_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          if [ -z "$KEYSTORE_FILE" ]; then
            echo "⚠️  KEYSTORE_FILE secret not set — release APK will use debug signing."
            exit 0
          fi
          echo "$KEYSTORE_FILE" | base64 --decode > android/app/release.keystore
          chmod 600 android/app/release.keystore

      - name: Write key.properties
        run: |
          if [ ! -f android/app/release.keystore ]; then
            echo "⚠️  Keystore not available — skipping key.properties generation."
            exit 0
          fi
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=release.keystore
          EOF

      # ── Dependencies & tests ───────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyse
        run: flutter analyze --no-pub

      - name: Set up Java 21 for Firestore emulator
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('scripts/package-lock.json') }}
          restore-keys: ${{ runner.os }}-node-modules-

      - name: Cache Firebase emulators
        uses: actions/cache@v4
        with:
          path: ~/.cache/firebase/emulators
          key: ${{ runner.os }}-firebase-emulators-${{ hashFiles('firebase.json') }}
          restore-keys: ${{ runner.os }}-firebase-emulators-

      - name: Install rules test dependencies
        working-directory: scripts
        run: npm ci

      - name: Strict Firestore rules lint
        working-directory: scripts
        run: npm run lint:firestore-rules

      - name: Strict Firestore rules tests
        working-directory: scripts
        run: npm test

      - name: Restore Java 17 for Android build
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Run tests
        run: flutter test

      - name: Build web
        run: flutter build web --release --no-wasm-dry-run

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-${{ steps.app_version.outputs.full }}-web
          path: build/web
          retention-days: 30

      # ── Build APKs ─────────────────────────────────────────────────────────
      - name: Build debug APK
        run: flutter build apk --debug

      - name: Rename debug APK
        run: |
          mv build/app/outputs/flutter-apk/app-debug.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ steps.app_version.outputs.full }}-debug.apk

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename release APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/ac-techs-${{ steps.app_version.outputs.full }}-release.apk

      # ── Upload APKs as artifacts (available even without a GitHub Release) ──
      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ac-techs-${{ steps.app_version.outputs.full }}-apks
          path: build/app/outputs/flutter-apk/ac-techs-*.apk
          retention-days: 30

      # ── Generate changelog from commits since last tag ─────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          # Find the previous tag (if any)
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          if [ -z "$PREV_TAG" ]; then
            # No prior tags: list last 20 commits
            LOG=$(git log --oneline --max-count=20 --pretty=format:"- %h: %s")
          else
            # List commits since previous tag
            LOG=$(git log "$PREV_TAG"..HEAD --oneline --pretty=format:"- %h: %s")
          fi
          # Fallback if no commits found
          if [ -z "$LOG" ]; then
            LOG="- Initial release or no commits found"
          fi
          # Write multi-line output safely to GITHUB_OUTPUT
          {
            echo "log<<CHANGELOG_EOF"
            echo "$LOG"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      # ── Create GitHub Release (tag pushes OR manual with create_release=true)
      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_version.outputs.value }}
          name: AC Techs ${{ steps.release_version.outputs.value }}
          draft: false
          prerelease: ${{ contains(steps.release_version.outputs.value, '-') }}
          body: |
            ## AC Techs ${{ steps.release_version.outputs.value }}

            Pubspec version: `${{ steps.app_version.outputs.full }}`

            ### 📥 Downloads
            | File | Description |
            |------|-------------|
            | `ac-techs-${{ steps.app_version.outputs.full }}-release.apk` | Production build (minified + R8) |
            | `ac-techs-${{ steps.app_version.outputs.full }}-debug.apk`   | Debug build (for testing) |

            ### 📝 Changes
            ${{ steps.changelog.outputs.log }}

            ---
            Built with Flutter stable · Firebase · Riverpod
          files: |
            build/app/outputs/flutter-apk/ac-techs-${{ steps.app_version.outputs.full }}-release.apk
            build/app/outputs/flutter-apk/ac-techs-${{ steps.app_version.outputs.full }}-debug.apk
