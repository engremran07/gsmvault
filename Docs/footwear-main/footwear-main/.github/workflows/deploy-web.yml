name: Deploy Web (Auto)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: stable
          cache: true

      - name: Write google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 -d > app/android/app/google-services.json

      - name: flutter pub get
        run: cd app && flutter pub get

      - name: flutter analyze
        run: cd app && flutter analyze lib --no-pub

      - name: flutter test
        run: cd app && flutter test -r expanded

      - name: Build web release
        run: cd app && flutter build web --release

      - name: Deploy Firestore rules and indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHOESERP }}' > "${{ runner.temp }}/firebase-sa.json"
          npm install -g firebase-tools
          firebase deploy --project shoeserp-clean-20260327 --only firestore:rules,firestore:indexes --non-interactive

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SHOESERP }}
          projectId: shoeserp-clean-20260327
          channelId: live
          entryPoint: '.'
