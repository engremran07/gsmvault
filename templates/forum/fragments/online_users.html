{# templates/forum/fragments/online_users.html — Who's online widget #}
<div class="bg-(--color-bg-secondary) rounded-xl border border-(--color-border) p-4">
  <h4 class="font-semibold text-(--color-text-primary) mb-3 flex items-center gap-2 text-sm">
    <i data-lucide="users" class="w-4 h-4 text-green-400"></i>
    Online Now ({{ online_users|length }})
  </h4>
  {% if online_users %}
  <div class="flex flex-wrap gap-2">
    {% for ou in online_users %}
    <a href="{% url 'forum:user_topics' pk=ou.user.pk %}"
       class="inline-flex items-center gap-1 text-xs px-2 py-1 rounded-full bg-green-500/10 text-green-400 hover:bg-green-500/20 transition-colors">
      <span class="w-1.5 h-1.5 rounded-full bg-green-400"></span>
      {{ ou.user.username }}
    </a>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-xs text-(--color-text-secondary)">No users online.</p>
  {% endif %}
</div>
