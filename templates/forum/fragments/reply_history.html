{# templates/forum/fragments/reply_history.html — Edit history accordion #}
{% if history %}
<div class="mt-3 bg-(--color-bg-tertiary) rounded-lg border border-(--color-border) p-3">
  <h4 class="text-xs font-semibold text-(--color-text-secondary) mb-2">Edit History</h4>
  {% for h in history %}
  <div class="border-t border-(--color-border) pt-2 mt-2 first:border-t-0 first:pt-0 first:mt-0">
    <div class="text-xs text-(--color-text-secondary) mb-1">
      Edited by {{ h.edited_by.username }} · {{ h.created_at|timesince }} ago
    </div>
    <div class="text-sm text-(--color-text-primary) opacity-70">
      {{ h.content_html|safe }}
    </div>
  </div>
  {% endfor %}
</div>
{% endif %}
