{# Local vendor integrity check — warns if any library failed to load #}
{% load static %}
<script nonce="{{ request.csp_nonce }}">
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    if (typeof htmx === 'undefined') console.warn('[vendor] HTMX failed to load');
    if (typeof lucide === 'undefined') console.warn('[vendor] Lucide failed to load');
    else lucide.createIcons();
  });
  // Alpine.js check — short delay since it's the last deferred script
  setTimeout(function() {
    if (typeof Alpine === 'undefined') console.warn('[vendor] Alpine.js failed to load');
  }, 1000);
})();
</script>
