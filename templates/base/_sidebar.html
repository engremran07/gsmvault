{# templates/base/_sidebar.html — Dashboard sidebar navigation #}
<aside class="w-64 bg-[var(--color-bg-secondary)] border-r border-[var(--color-border)] hidden lg:flex lg:flex-col">
  <div class="p-4 space-y-1 flex-1">
    <a href="{% url 'users:dashboard' %}" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--color-text-secondary)] hover:bg-[var(--color-bg-primary)] hover:text-[var(--color-accent)] transition-colors">
      <i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard
    </a>
    <a href="{% url 'users:profile' %}" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--color-text-secondary)] hover:bg-[var(--color-bg-primary)] hover:text-[var(--color-accent)] transition-colors">
      <i data-lucide="user" class="w-4 h-4"></i> Profile
    </a>
    <a href="{% url 'users:notification_settings' %}" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--color-text-secondary)] hover:bg-[var(--color-bg-primary)] hover:text-[var(--color-accent)] transition-colors">
      <i data-lucide="settings" class="w-4 h-4"></i> Settings
    </a>
    {% if user.is_staff %}
    <div class="!mt-3 pt-3 border-t border-[var(--color-border)]">
      <a href="{% url 'admin_suite:admin_suite' %}" class="flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-[var(--color-accent)] hover:bg-[var(--color-accent)]/10 transition-colors font-medium">
        <i data-lucide="shield" class="w-4 h-4"></i> Admin Panel
      </a>
    </div>
    {% endif %}
  </div>
  {# Theme switcher at bottom of sidebar #}
  <div class="p-4 border-t border-[var(--color-border)]">
    {% include "components/_theme_switcher.html" %}
  </div>
</aside>
