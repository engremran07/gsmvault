{% comment %}Sticky anchor ad — slides up from bottom, dismissable per session.{% endcomment %}
{% load ad_tags %}
{% if ads_show and ads_settings.auto_ads_anchor %}
<div id="anchor-ad-wrapper"
     x-data="anchorAd()"
     x-show="visible"
     x-transition:enter="transition ease-out duration-300"
     x-transition:enter-start="translate-y-full opacity-0"
     x-transition:enter-end="translate-y-0 opacity-100"
     x-transition:leave="transition ease-in duration-200"
     x-transition:leave-start="translate-y-0 opacity-100"
     x-transition:leave-end="translate-y-full opacity-0"
     x-cloak
     class="fixed bottom-0 inset-x-0 z-[9990] pointer-events-none"
     style="display:none;">
  <div class="pointer-events-auto max-w-4xl mx-auto px-4 pb-2">
    <div class="relative bg-(--color-bg-secondary) border border-(--color-border)
                rounded-t-xl shadow-2xl overflow-hidden">
      {# Close button #}
      <button @click="dismiss()"
              class="absolute top-1 right-1 z-10 p-1 rounded-full
                     bg-(--color-bg-tertiary) hover:bg-(--color-bg-primary)
                     text-(--color-text-muted) hover:text-(--color-text-primary)
                     transition-colors"
              aria-label="Close ad"
              title="Close">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
             stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
      {# Ad content #}
      <div class="px-4 py-3">
        {% render_ad_slot "anchor-bottom" %}
      </div>
      {# Ad label #}
      <div class="text-center text-[10px] text-(--color-text-muted) pb-1 opacity-60">
        Advertisement
      </div>
    </div>
  </div>
</div>
{% endif %}
