{# templates/errors/400.html — Bad Request #}
{% extends "layouts/minimal.html" %}

{% block title %}400 — Bad Request{% endblock %}

{% block error_content %}
<div class="text-6xl font-bold text-(--color-warning) mb-4">400</div>
<h1 class="text-2xl font-semibold mb-2">Bad Request</h1>
<p class="text-(--color-text-secondary) mb-6">The server could not understand your request.</p>
<a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-(--color-accent) text-(--color-accent-text) hover:bg-(--color-accent-hover) transition-colors">
  <i data-lucide="home" class="w-4 h-4"></i> Go Home
</a>
{% endblock %}
