{# templates/errors/404.html — Not Found #}
{% extends "layouts/minimal.html" %}

{% block title %}404 — Page Not Found{% endblock %}

{% block error_content %}
<div class="text-6xl font-bold text-[var(--color-accent)] mb-4">404</div>
<h1 class="text-2xl font-semibold mb-2">Page Not Found</h1>
<p class="text-[var(--color-text-secondary)] mb-6">The page you're looking for doesn't exist or has been moved.</p>
<a href="{% url 'home' %}" class="inline-flex items-center gap-2 px-4 py-2 rounded-lg bg-[var(--color-accent)] text-[var(--color-accent-text)] hover:bg-[var(--color-accent-hover)] transition-colors">
  <i data-lucide="home" class="w-4 h-4"></i> Go Home
</a>
{% endblock %}
