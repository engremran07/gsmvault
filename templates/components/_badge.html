{# templates/components/_badge.html — Status badge #}
<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium
  {% if variant == 'success' %}bg-green-500/10 text-green-400
  {% elif variant == 'warning' %}bg-yellow-500/10 text-yellow-400
  {% elif variant == 'error' %}bg-red-500/10 text-red-400
  {% elif variant == 'info' %}bg-blue-500/10 text-blue-400
  {% else %}bg-accent/10 text-(--color-accent){% endif %}">
  {{ label }}
</span>
