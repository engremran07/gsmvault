{# templates/components/_empty_state.html — Empty state placeholder #}
<div class="flex flex-col items-center justify-center py-12 text-center">
  <i data-lucide="{{ icon|default:'inbox' }}" class="w-12 h-12 text-[var(--color-text-secondary)] mb-4"></i>
  <p class="text-[var(--color-text-secondary)] text-lg mb-2">{{ message|default:"Nothing here yet." }}</p>
  {% if action_url %}
  <a href="{{ action_url }}" class="text-[var(--color-accent)] hover:underline text-sm">{{ action_text|default:"Get started" }}</a>
  {% endif %}
</div>
